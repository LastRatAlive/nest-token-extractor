name: Release Extension

on:
  release:
    types: [published]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create extension zip
        run: |
          cd extension
          zip -r ../nest-token-extractor.zip .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: nest-token-extractor.zip
